<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>提交成功 | livestreaming.hk</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { brandRed: 'rgba(212, 4, 72, 1)' } } } }
    </script>
    <style>
        .pulse-red { animation: pulse 2s infinite; }
        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(212, 4, 72, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(212, 4, 72, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(212, 4, 72, 0); }
        }
    </style>
</head>
<body class="bg-white h-screen flex flex-col items-center justify-center text-center px-6">
    <div class="mb-8 w-24 h-24 bg-brandRed rounded-full flex items-center justify-center pulse-red">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M5 13l4 4L19 7" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <h1 class="text-5xl font-black text-black uppercase italic mb-4">資料 <span class="text-brandRed">已成功傳送</span></h1>
    <p class="text-xl text-gray-600 mb-12">我們已收到您的直播需求。工程團隊會盡快回覆。</p>
    <div class="text-gray-400 font-bold uppercase text-xs tracking-widest">將在 <span id="timer" class="text-brandRed text-lg">5</span> 秒後返回主頁...</div>

    <script>
        let s = 5;
        const timer = setInterval(() => {
            s--;
            document.getElementById('timer').innerText = s;
            if (s <= 0) {
                clearInterval(timer);
                window.location.href = "zh.html"; // Returns to the new Chinese index
            }
        }, 1000);
    </script>
</body>
</html>
